<!DOCTYPE html>
{% extends "base.html" %}
{% block content %}

<div class="max-w-6xl mx-auto">
    <h1 class="text-4xl font-bold mb-10">Publier un film :</h1>

    <form action="/ajouter" method="POST" class="flex flex-col items-center space-y-10">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 w-full">
            
            <div class="bg-[#1e2129] p-8 rounded-[40px] flex flex-col items-center justify-center min-h-[400px] border border-gray-700 shadow-2xl">
                <h2 class="text-3xl font-bold mb-8">Poster :</h2>
                <div class="flex-grow flex items-center justify-center">
                    <label class="cursor-pointer bg-[#7b1d2e] hover:bg-[#9b2d3e] transition-colors px-6 py-4 rounded-xl flex items-center space-x-3 border-2 border-dashed border-white/30">
                        <span class="text-2xl">📤</span>
                        <span class="font-bold">Importer une image</span>
                        <input type="file" class="hidden" name="poster">
                    </label>
                </div>
            </div>

            <div class="bg-[#1e2129] p-8 rounded-[40px] border border-gray-700 shadow-2xl text-left">
                <h2 class="text-3xl font-bold mb-6 text-center">Infos principales :</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block font-bold mb-1 ml-2">Titre :</label>
                        <input type="text" name="titre" class="w-full bg-[#7b1d2e]/40 border-none rounded-2xl p-3 focus:ring-2 focus:ring-red-500 outline-none">
                    </div>
                    <div>
                        <label class="block font-bold mb-1 ml-2">Date :</label>
                        <input type="date" name="date" class="w-full bg-[#7b1d2e]/40 border-none rounded-2xl p-3 focus:ring-2 focus:ring-red-500 outline-none">
                    </div>
                    <div>
                        <label class="block font-bold mb-1 ml-2">Durée :</label>
                        <input type="time" name="duree" 
                            class="w-full bg-[#7b1d2e]/40 border-none rounded-2xl p-3 focus:ring-2 focus:ring-red-500 outline-none [color-scheme:dark]">
                    </div>
                    <div>
                        <label class="block font-bold mb-1 ml-2">Synopsis :</label>
                        <textarea name="synopsis" rows="4" class="w-full bg-[#7b1d2e]/40 border-none rounded-2xl p-3 focus:ring-2 focus:ring-red-500 outline-none resize-none"></textarea>
                    </div>
                </div>
            </div>

            <div class="bg-[#1e2129] p-8 rounded-[40px] border border-gray-700 shadow-2xl text-left">
                <h2 class="text-3xl font-bold mb-6 text-center">Details :</h2>
                <div class="space-y-6">
                    <div>
                        <label class="block text-2xl font-bold mb-2 ml-2">Genre :</label>
                        <input type="text" name="genre" class="w-full bg-[#7b1d2e]/40 border-none rounded-2xl p-4 focus:ring-2 focus:ring-red-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-2xl font-bold mb-2 ml-2">Studio :</label>
                        <input type="text" name="studio" class="w-full bg-[#7b1d2e]/40 border-none rounded-2xl p-4 focus:ring-2 focus:ring-red-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-2xl font-bold mb-2 ml-2">Producteur :</label>
                        <input type="text" name="producteur" class="w-full bg-[#7b1d2e]/40 border-none rounded-2xl p-4 focus:ring-2 focus:ring-red-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-2xl font-bold mb-2 ml-2">Acteurs :</label>
                        <textarea name="acteurs" rows="3" class="w-full bg-[#7b1d2e]/40 border-none rounded-2xl p-4 focus:ring-2 focus:ring-red-500 outline-none resize-none"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <button type="submit" class="group relative flex items-center space-x-4 bg-[#7b1d2e] hover:bg-[#9b2d3e] px-16 py-4 rounded-2xl border-2 border-white transition-all transform hover:scale-105 shadow-[0_0_20px_rgba(123,29,46,0.5)]">
            <span class="text-3xl transform group-hover:translate-x-2 group-hover:-translate-y-1 transition-transform">✈️</span>
            <span class="text-3xl font-bold uppercase tracking-widest">Publier</span>
        </button>
    </form>
</div>

{% endblock %}
