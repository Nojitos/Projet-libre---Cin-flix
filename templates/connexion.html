<!DOCTYPE html>
{% extends "base.html" %}

{% block content %}

<div class="min-h-[85vh] flex items-center justify-center px-6">

    <div class="
    relative
    bg-[#0b0f1a]
    border
    border-gray-800
    w-full
    max-w-[500px]
    p-10
    rounded-[2.5rem]
    overflow-hidden
    ">

        <!-- GLOW -->
        <div class="
        absolute
        -top-20
        -right-20
        w-60
        h-60
        bg-red-600/20
        blur-[100px]
        rounded-full
        ">
        </div>

        <div class="relative z-10">

            <!-- LOGO -->
            <div class="flex justify-center mb-6">

                <img
                src="/static/oscar.png"
                class="
                h-24
                object-contain
                drop-shadow-[0_0_20px_rgba(255,0,0,.4)]
                "
                >

            </div>

            <!-- TITRE -->

            <h1 class="
            text-5xl
            font-bold
            text-center
            mb-3
            ">

                Bon retour 👋

            </h1>

            <p class="
            text-center
            text-gray-300
            mb-10
            text-lg
            ">

                Connectez-vous pour retrouver
                vos films et séries favoris.

            </p>

            <!-- ERREUR -->

            {% if error is not none %}

            <div class="
            bg-red-500/10
            border
            border-red-500/30
            text-red-400
            rounded-2xl
            px-5
            py-4
            mb-8
            flex
            items-center
            ">

                <svg class="w-5 h-5 mr-3"
                fill="currentColor"
                viewBox="0 0 20 20">

                    <path
                    fill-rule="evenodd"
                    d="M18 10a8 8 0 11-16 0
                    8 8 0 0116 0zm-7-4a1
                    1 0 11-2 0 1 1 0
                    012 0zM9 9a1 1 0
                    000 2v3a1 1 0
                    001 1h1a1 1 0
                    100-2v-3a1 1 0
                    00-1-1H9z"
                    clip-rule="evenodd">

                    </path>

                </svg>

                {{ error }}

            </div>

            {% endif %}

            <form
            method="POST"
            action="{{ url_for('connexion') }}"
            class="space-y-6">

                <!-- PSEUDO -->

                <div>

                    <label class="
                    text-sm
                    uppercase
                    tracking-wider
                    text-gray-400
                    mb-2
                    block
                    ">

                        Pseudo

                    </label>

                    <div class="
                    glass
                    flex
                    items-center
                    px-5
                    py-4
                    ">

                        <img
                        src="{{ url_for(
                        'static',
                        filename='pseudo.png'
                        ) }}"
                        class="
                        w-5
                        h-5
                        mr-4
                        opacity-70
                        ">

                        <input
                        type="text"
                        name="pseudo"
                        placeholder="Votre pseudo"

                        class="
                        bg-transparent
                        outline-none
                        w-full
                        text-white
                        placeholder-gray-400
                        "

                        required>

                    </div>

                </div>

                <!-- MOT DE PASSE -->

                <div>

                    <label class="
                    text-sm
                    uppercase
                    tracking-wider
                    text-gray-400
                    mb-2
                    block
                    ">

                        Mot de passe

                    </label>

                    <div class="
                    glass
                    flex
                    items-center
                    px-5
                    py-4
                    ">

                        <img
                        src="{{ url_for(
                        'static',
                        filename='verrouiller.png'
                        ) }}"
                        class="
                        w-5
                        h-5
                        mr-4
                        opacity-70
                        ">

                        <input
                        type="password"
                        name="mdp"

                        placeholder=
                        "Votre mot de passe"

                        class="
                        bg-transparent
                        outline-none
                        w-full
                        text-white
                        placeholder-gray-400
                        "

                        required>

                    </div>

                </div>

                <!-- BTN -->

                <button
                type="submit"

                class="
                glass-btn
                w-full
                py-4
                text-lg
                font-bold
                hover:scale-[1.02]
                transition
                duration-300
                ">

                    Se connecter 🎬

                </button>

            </form>

            <!-- SIGNUP -->

            <div class="
            mt-8
            text-center
            text-gray-400
            ">

                Pas encore de compte ?

                <a
                href="/creer_compte"

                class="
                text-red-400
                hover:text-red-300
                transition
                font-semibold
                ">

                    Créer un compte

                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
