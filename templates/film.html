<!DOCTYPE html>
{% extends "base.html" %}
{% block content %}

<div class="max-w-6xl mx-auto">
    <h1 class="text-4xl font-bold mb-10">{{ film["titre"] }}</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 w-full">
        
        <div class="bg-[#1e2129] p-8 rounded-[40px] flex flex-col items-center justify-center min-h-[400px] border border-gray-700 shadow-2xl">
            <h2 class="text-3xl font-bold mb-8">Poster :</h2>
                <div class="w-full h-full flex flex-col items-center justify-center">
                    <img src="\{{ film['poster'] }}" alt="Aperçu du poster" class="max-h-[300px] rounded-lg shadow-lg mb-4">
                </div>
        </div>

        <div class="bg-[#1e2129] p-8 rounded-[40px] border border-gray-700 shadow-2xl text-left">
            <h2 class="text-3xl font-bold mb-6 text-center">Infos principales :</h2>
            <div class="space-y-4">
                <div>
                    <label class="block font-bold mb-1 ml-2">Titre :</label>
                    <p class="w-full bg-[#7b1d2e]/40 border-none rounded-2xl p-3 focus:ring-2 focus:ring-red-500 outline-none">{{ film["titre"] }}</p>
                </div>
                <div>
                    <label class="block font-bold mb-1 ml-2">Date :</label>
                    <p class="w-full bg-[#7b1d2e]/40 border-none rounded-2xl p-3 focus:ring-2 focus:ring-red-500 outline-none">{{ film["date"] }}</p>
                </div>
                <div>
                    <label class="block font-bold mb-1 ml-2">Durée :</label>
                    <p class="w-full bg-[#7b1d2e]/40 border-none rounded-2xl p-3 focus:ring-2 focus:ring-red-500 outline-none [color-scheme:dark]"> {{film["duree"]}} </p>
                </div>
                <div>
                    <label class="block font-bold mb-1 ml-2">Synopsis :</label>
                    <p class="w-full bg-[#7b1d2e]/40 border-none rounded-2xl p-3 focus:ring-2 focus:ring-red-500 outline-none resize-none"> {{film["synopsis"]}} </p>
                </div>
            </div>
        </div>

        <div class="bg-[#1e2129] p-8 rounded-[40px] border border-gray-700 shadow-2xl text-left">
            <h2 class="text-3xl font-bold mb-6 text-center">Details :</h2>
            <div class="space-y-6">
                <div>
                    <label class="block text-2xl font-bold mb-2 ml-2">Genre :</label>
                    <p class="w-full bg-[#7b1d2e]/40 border-none rounded-2xl p-4 focus:ring-2 focus:ring-red-500 outline-none"> {{film["genre"]}} </p>
                </div>
                <div>
                    <label class="block text-2xl font-bold mb-2 ml-2">Studio :</label>
                    <p class="w-full bg-[#7b1d2e]/40 border-none rounded-2xl p-4 focus:ring-2 focus:ring-red-500 outline-none"> {{film["studio"]}} </p>
                </div>
                <div>
                    <label class="block text-2xl font-bold mb-2 ml-2">Producteur :</label>
                    <p class="w-full bg-[#7b1d2e]/40 border-none rounded-2xl p-4 focus:ring-2 focus:ring-red-500 outline-none"> {{film["producteur"]}} </p>
                </div>
                <div>
                    <label class="block text-2xl font-bold mb-2 ml-2">Acteurs :</label>
                    <p class="w-full bg-[#7b1d2e]/40 border-none rounded-2xl p-4 focus:ring-2 focus:ring-red-500 outline-none resize-none"> {{film["acteurs"]}} </p>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
