<!DOCTYPE html>
{% extends "base.html" %}

{% block content %}

<div class="min-h-[90vh] flex items-center justify-center px-4 sm:px-6 py-6">

    <div class="
    relative
    bg-[#0b0f1a]
    border
    border-gray-800
    w-full
    max-w-[520px]
    p-6
    sm:p-8
    md:p-10
    rounded-[2rem]
    md:rounded-[2.5rem]
    overflow-hidden
    ">

        <!-- GLOW -->
        <div class="
        absolute
        -top-20
        -left-20
        w-48
        h-48
        sm:w-60
        sm:h-60
        md:w-72
        md:h-72
        bg-red-600/20
        blur-[80px]
        md:blur-[110px]
        rounded-full
        ">
        </div>

        <div class="relative z-10">

            <!-- OSCAR -->

            <div class="flex justify-center mb-6">

                <img
                src="/static/oscar.png"

                class="
                h-16
                sm:h-20
                md:h-24
                object-contain
                drop-shadow-[0_0_20px_rgba(255,0,0,.4)]
                ">

            </div>

            <!-- TITRE -->

            <h1 class="
            text-3xl
            sm:text-4xl
            md:text-5xl
            font-bold
            text-center
            mb-3
            ">

                Bienvenue 🎬

            </h1>

            <p class="
            text-center
            text-gray-300
            text-base
            md:text-lg
            mb-8
            md:mb-10
            ">

                Créez votre compte pour retrouver
                vos films et séries favoris.

            </p>

            <!-- ERREUR -->

            {% if error is not none %}

            <div class="
            bg-red-500/10
            border
            border-red-500/30
            text-red-400
            rounded-2xl
            px-4
            md:px-5
            py-4
            mb-6
            md:mb-8
            flex
            items-center
            text-sm
            md:text-base
            ">

                <svg
                class="w-5 h-5 mr-3 flex-shrink-0"
                fill="currentColor"
                viewBox="0 0 20 20">

                    <path
                    fill-rule="evenodd"

                    d="
                    M18 10a8 8 0 11-16 0
                    8 8 0 0116 0zm-7-4a1
                    1 0 11-2 0 1 1 0
                    012 0zM9 9a1 1 0
                    000 2v3a1 1 0
                    001 1h1a1 1 0
                    100-2v-3a1 1 0
                    00-1-1H9z
                    "

                    clip-rule="evenodd">

                    </path>

                </svg>

                {{ error }}

            </div>

            {% endif %}

            <form
            method="POST"
            action="{{ url_for('creer_compte') }}"

            class="space-y-5 md:space-y-6">

                <!-- PSEUDO -->

                <div>

                    <label class="
                    block
                    text-sm
                    uppercase
                    tracking-wider
                    text-gray-400
                    mb-2
                    ">

                        Pseudo

                    </label>

                    <div class="
                    glass
                    flex
                    items-center
                    px-4
                    md:px-5
                    py-3
                    md:py-4
                    ">

                        <img

                        src="{{ url_for(
                        'static',
                        filename='pseudo.png'
                        ) }}"

                        class="
                        w-5
                        h-5
                        mr-4
                        opacity-70
                        ">

                        <input

                        type="text"
                        name="pseudo"

                        placeholder=
                        "Votre pseudo"

                        class="
                        bg-transparent
                        outline-none
                        w-full
                        text-white
                        placeholder-gray-400
                        text-sm
                        md:text-base
                        "

                        required>

                    </div>

                </div>

                <!-- MDP -->

                <div>

                    <label class="
                    block
                    text-sm
                    uppercase
                    tracking-wider
                    text-gray-400
                    mb-2
                    ">

                        Mot de passe

                    </label>

                    <div class="
                    glass
                    flex
                    items-center
                    px-4
                    md:px-5
                    py-3
                    md:py-4
                    ">

                        <img

                        src="{{ url_for(
                        'static',
                        filename='verrouiller.png'
                        ) }}"

                        class="
                        w-5
                        h-5
                        mr-4
                        opacity-70
                        ">

                        <input

                        type="password"
                        name="mdp"

                        placeholder=
                        "Votre mot de passe"

                        class="
                        bg-transparent
                        outline-none
                        w-full
                        text-white
                        placeholder-gray-400
                        text-sm
                        md:text-base
                        "

                        required>

                    </div>

                </div>

                <!-- CONFIRMATION -->

                <div>

                    <label class="
                    block
                    text-sm
                    uppercase
                    tracking-wider
                    text-gray-400
                    mb-2
                    ">

                        Confirmation

                    </label>

                    <div class="
                    glass
                    flex
                    items-center
                    px-4
                    md:px-5
                    py-3
                    md:py-4
                    ">

                        <img

                        src="{{ url_for(
                        'static',
                        filename='verrouiller.png'
                        ) }}"

                        class="
                        w-5
                        h-5
                        mr-4
                        opacity-70
                        ">

                        <input

                        type="password"

                        name="mdp_confirm"

                        placeholder=
                        "Confirmez votre mot de passe"

                        class="
                        bg-transparent
                        outline-none
                        w-full
                        text-white
                        placeholder-gray-400
                        text-sm
                        md:text-base
                        "

                        required>

                    </div>

                </div>

                <!-- BTN -->

                <button

                type="submit"

                class="
                glass-btn
                w-full
                py-3
                md:py-4
                text-base
                md:text-lg
                font-bold
                hover:scale-[1.02]
                transition
                duration-300
                ">

                    Créer mon compte ✨

                </button>

            </form>

            <!-- LOGIN -->

            <div class="
            mt-6
            md:mt-8
            text-center
            text-gray-400
            text-sm
            md:text-base
            ">

                Vous avez déjà un compte ?

                <a

                href="/connexion"

                class="
                text-red-400
                hover:text-red-300
                transition
                font-semibold
                ">

                    Se connecter

                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
