<!DOCTYPE html>
{% extends "base.html" %}

{% block content %}
<div class="w-full h-screen flex flex-col items-start justify-start gap-10 bg-black text-white p-10">

<h1 class="text-4xl font-bold">Administration🅰️</h1>
    <p>Bienvenue dans le panel d'administration !</p>

    <h2><strong>Gérez un utilisateur</strong></h2>
    <div>
        <form method="POST" action="/admin/user">
            <input type="text" name="username" placeholder="Nom d'utilisateur" required class="p-2 rounded bg-gray-800 text-white">
            <input type="email" name="email" placeholder="Email" required class="p-2 rounded bg-gray-800 text-white">
            <input type="password" name="password" placeholder="Mot de passe" required class="p-2 rounded bg-gray-800 text-white">
            <button type="submit" class="p-2 bg-blue-600 rounded">Créer l'utilisateur</button>
        </form>
    </div>

</div>
{% endblock %}
