<!DOCTYPE html>
{% extends "base.html" %}

{% block content %}

<div class="w-full min-h-screen bg-black text-white px-6 py-10">

    <!-- HEADER -->
    <div class="max-w-6xl mx-auto mb-12">
        <h1 class="text-4xl font-bold mb-2">Administration 🅰️</h1>
        <p class="text-gray-400">Gérez les utilisateurs</p>
    </div>

    <div class="max-w-6xl mx-auto space-y-16">

        <!-- SECTION USERS -->
        <section>
            <h2 class="text-2xl font-semibold mb-6">👥 Utilisateurs</h2>

            <!-- LISTE USERS -->
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                {% for user in db_users %}
                <div class="bg-gray-900 p-5 rounded-2xl shadow-lg hover:scale-105 transition duration-300 flex flex-col items-center">
                    
                    <div class="w-16 h-16 bg-cyan-500 rounded-full flex items-center justify-center text-xl font-bold mb-3">
                        {{ user["pseudo"][0]|upper }}
                    </div>

                    <h3 class="font-medium">{{ user["pseudo"] }}</h3>

                    
                        <input type="hidden" name="username" value="{{ user['pseudo'] }}">
                        <form method="POST" action="/delete_user/{{ user['pseudo'] }}" class="mt-4">
                        <button class="text-sm bg-red-600 hover:bg-red-700 px-4 py-2 rounded-full transition">
                            Supprimer 🗑️
                        </button>
                        </form>

                </div>
                {% endfor %}
            </div>
        </section>

        <!-- SECTION CREATE USER -->
        <section>
            <h2 class="text-2xl font-semibold mb-6">Créer un utilisateur</h2>

            <div class="bg-gray-900 p-8 rounded-2xl shadow-lg max-w-xl">

                <form method="POST" action="{{ url_for('creer_compte_admin') }}" class="flex flex-col gap-4">

                    <input type="text" name="pseudo" placeholder="Nom d'utilisateur"
                        class="px-4 py-3 rounded-full bg-gray-800 text-white focus:outline-none">

                    <input type="password" name="mdp" placeholder="Mot de passe"
                        class="px-4 py-3 rounded-full bg-gray-800 text-white focus:outline-none">

                    <input type="password" name="mdp_confirm" placeholder="Confirmer le mot de passe"
                        class="px-4 py-3 rounded-full bg-gray-800 text-white focus:outline-none">

                    <button class="bg-green-600 hover:bg-green-700 py-3 rounded-full font-semibold transition" type="submit">
                        Créer l'utilisateur
                    </button>

                </form>

            </div>
        </section>

        <!-- Gestion des rôles -->
     <div>
        <h2 class="text-2xl font-semibold mb-6 mt-16">🔐 Gestion des rôles</h2>

        <div class="bg-gray-900 p-8 rounded-2xl shadow-lg max-w-xl">
            <form method="POST" action="/change_role" class="flex flex-col gap-4">
                <select name="username" class="px-4 py-3 rounded-full bg-gray-800 text-white focus:outline-none">
                    {% for user in db_users %}
                        <option value="{{ user['pseudo'] }}">{{ user['pseudo'] }}</option>
                    {% endfor %}
                </select>

                <select name="role" class="px-4 py-3 rounded-full bg-gray-800 text-white focus:outline-none">
                    <option value="user">Utilisateur🧙‍♂️</option>
                    <option value="admin">Administrateur👑</option>
                    <option value="moderator">Modérateur🖌️</option>
                </select>

                <button class="bg-blue-600 hover:bg-blue-700 py-3 rounded-full font-semibold transition" type="submit">
                    Changer le rôle
                </button>
            </form>

            
     </div>
    </div>
</div>

{% endblock %}
