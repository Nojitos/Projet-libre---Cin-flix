<!DOCTYPE html>
{% extends "base.html" %}

{% block content %}

<div class="relative min-h-[95vh] flex items-center justify-center overflow-hidden">

    <!-- Glow rouge -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[700px] h-[700px] bg-red-600/10 rounded-full blur-[180px]"></div>

    <!-- Glow secondaire -->
    <div class="absolute top-20 left-20 w-60 h-60 bg-red-500/10 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-20 right-20 w-80 h-80 bg-red-700/10 rounded-full blur-[140px]"></div>

    <!-- Carte -->
    <div class="
        relative z-10
        max-w-2xl
        mx-auto
        text-center
        bg-[#0b0f1a]/80
        backdrop-blur-xl
        border border-gray-800
        rounded-[3rem]
        px-8 md:px-16
        py-12 md:py-16
        shadow-[0_0_50px_rgba(0,0,0,0.5)]
    ">

        <!-- Emoji -->
        <div class="text-6xl mb-6">
            🎬
        </div>

        <!-- 404 -->
        <h1 class="
            text-8xl
            md:text-[180px]
            font-black
            leading-none
            text-red-600
            drop-shadow-[0_0_40px_rgba(220,38,38,0.7)]
        ">
            404
        </h1>

        <!-- Texte -->
        <h2 class="text-2xl md:text-4xl font-bold mt-4">
            Scène introuvable
        </h2>

        <p class="
            text-gray-400
            text-lg
            mt-4
            max-w-lg
            mx-auto
            leading-relaxed
        ">
            Il semble que cette page ait été coupée au montage...
            Retournez à l'accueil pour continuer votre séance.
        </p>

        <!-- Boutons -->
        <div class="flex flex-col sm:flex-row justify-center gap-4 mt-10">

            <a href="{{ url_for('index') }}"
               class="
               glass-btn
               px-8
               py-4
               rounded-full
               font-bold
               hover:scale-105
               transition
               ">
                🏠 Retour à l'accueil
            </a>

            <a href="/films"
               class="
               glass
               px-8
               py-4
               rounded-full
               font-bold
               hover:scale-105
               transition
               ">
               
                🎬 Voir les films
            </a>

        </div>

        <a href="https://flickle.app"
               class="
               glass
               px-8
               py-4
               rounded-full
               font-bold
               hover:scale-105
               transition
               mt-6
               "
               target="_blank">
                Jouer à un petit jeu...
            </a>

    </div>

</div>

{% endblock %}
